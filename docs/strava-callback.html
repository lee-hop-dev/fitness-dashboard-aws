<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting Strava…</title>
  <style>
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #111;
      border: 1px solid #1e3a2f;
      border-radius: 8px;
      padding: 2rem 2.5rem;
      text-align: center;
      max-width: 400px;
    }
    .logo { font-size: 2rem; margin-bottom: 1rem; }
    h2    { color: #00e5a0; margin: 0 0 0.5rem; font-size: 1.1rem; }
    p     { color: #888; font-size: 0.85rem; margin: 0.25rem 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e3a2f;
      border-top-color: #00e5a0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.25rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error  { color: #ff6b6b; }
    .success { color: #00e5a0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔗</div>
    <h2 id="title">Connecting Strava</h2>
    <p  id="msg">Exchanging authorisation code…</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <script>
    const API_BASE    = 'https://j2zxz92vd4.execute-api.eu-west-2.amazonaws.com/prod';
    const RETURN_PAGE = 'index.html';

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const error  = params.get('error');

      if (error) {
        showError('Strava authorisation denied.', 'You can close this tab and try again.');
        return;
      }

      if (!code) {
        showError('No authorisation code received.', 'Please try connecting again.');
        return;
      }

      try {
        // Exchange code via our Lambda (keeps client_secret server-side)
        const resp = await fetch(`${API_BASE}/strava/token`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ code }),
        });

        const data = await resp.json();

        if (!resp.ok || data.error) {
          throw new Error(data.error || `HTTP ${resp.status}`);
        }

        // Store tokens in sessionStorage (cleared when browser closes)
        // Never stored in localStorage to minimise token exposure
        sessionStorage.setItem('strava_access_token',  data.access_token);
        sessionStorage.setItem('strava_refresh_token', data.refresh_token);
        sessionStorage.setItem('strava_expires_at',    String(data.expires_at));
        sessionStorage.setItem('strava_athlete_id',    String(data.athlete?.id || ''));
        sessionStorage.setItem('strava_connected',     'true');

        showSuccess('Strava connected!', `Welcome, ${data.athlete?.firstname || 'athlete'}.`);

        // Redirect back after short delay
        setTimeout(() => {
          const returnTo = sessionStorage.getItem('strava_return_to') || RETURN_PAGE;
          sessionStorage.removeItem('strava_return_to');
          window.location.href = returnTo;
        }, 1500);

      } catch (ex) {
        showError('Connection failed.', ex.message);
      }
    }

    function showError(title, detail) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent    = title;
      document.getElementById('title').className      = 'error';
      document.getElementById('msg').textContent      = detail;
    }

    function showSuccess(title, detail) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent    = title;
      document.getElementById('title').className      = 'success';
      document.getElementById('msg').textContent      = detail;
    }

    handleCallback();
  </script>
</body>
</html>
